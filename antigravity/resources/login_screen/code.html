<body class="antialiased relative min-h-screen bg-white">
<!-- Atmospheric Background Image -->
<!-- Main Content Container -->
<main class="relative z-10 min-h-screen flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<!-- Login Card -->
<div class="w-full max-w-[440px] bg-white rounded-lg shadow-sm border border-outline-variant/30 flex flex-col p-stack-lg">
<!-- Header Section -->
<header class="flex flex-col items-center justify-center mb-stack-md text-center"><h2 class="font-headline-lg text-headline-lg text-on-surface mb-stack-md">Iniciar Sesión</h2></header>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-stack-sm w-full" method="POST">
<!-- Input Field: Cédula -->
<div class="relative w-full"><label class="block font-label-bold text-label-bold text-on-surface mb-2" for="documento">Número de Cédula (CC)</label><input autocomplete="username" class="w-full h-touch-target-min px-4 bg-white border border-outline-variant rounded text-on-surface font-body-md focus:outline-none focus:border-primary-fixed transition-colors" id="documento" name="documento" placeholder="Ingrese su cédula" required="" type="text"></div>
<!-- Input Field: Contraseña -->
<div class="relative w-full"><label class="block font-label-bold text-label-bold text-on-surface mb-2" for="password">Contraseña</label><input autocomplete="current-password" class="w-full h-touch-target-min px-4 bg-white border border-outline-variant rounded text-on-surface font-body-md focus:outline-none focus:border-primary-fixed transition-colors" id="password" name="password" placeholder="Ingrese su contraseña" required="" type="password"></div>
<!-- Submit Button -->
<button class="w-full h-touch-target-min mt-base bg-primary-container text-on-surface font-cta text-label-bold rounded shadow-sm hover:bg-primary-fixed-dim transition-all duration-150" type="submit">Ingresar al Sistema</button>
</form>
<!-- Footer Link -->
<div class="mt-stack-sm flex justify-center">
<a class="font-body-md text-body-md text-on-secondary-container hover:text-on-surface transition-colors underline underline-offset-4" href="#">
                    ¿Olvidaste tu contraseña?
                </a>
</div>
</div>
</main>
<script>
        // Simple password visibility toggle
        document.addEventListener('DOMContentLoaded', () => {
            const toggleButton = document.querySelector('button[aria-label="Toggle password visibility"]');
            const passwordInput = document.getElementById('password');
            const icon = toggleButton.querySelector('.material-symbols-outlined');

            toggleButton.addEventListener('click', () => {
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    icon.textContent = 'visibility';
                } else {
                    passwordInput.type = 'password';
                    icon.textContent = 'visibility_off';
                }
            });
        });
    </script>
